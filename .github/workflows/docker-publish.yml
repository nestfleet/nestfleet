name: Publish Docker images

# Runs on every merge to main, after the CI workflow passes.
# Builds API + Console images and pushes to GHCR as:
#   ghcr.io/nestfleet/nestfleet-api:latest   + :<sha>
#   ghcr.io/nestfleet/nestfleet-console:latest + :<sha>
#
# Package visibility: set to public in GitHub → Packages after first push.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  publish:
    name: Build & push images
    runs-on: ubuntu-latest
    # Only run when CI passed — skip on CI failure or PR runs
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nestfleet/nestfleet-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push — API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — Console
        id: meta-console
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nestfleet/nestfleet-console
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push — Console
        uses: docker/build-push-action@v6
        with:
          context: console
          file: console/Dockerfile
          push: true
          tags: ${{ steps.meta-console.outputs.tags }}
          labels: ${{ steps.meta-console.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_PRODUCT_ID=
            NEXT_PUBLIC_SHOW_LANDING=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
