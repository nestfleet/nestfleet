name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI-06: Cancel in-progress runs on the same branch when a new push arrives.
# Uses the branch ref so PRs and main runs have separate groups.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── CI-02 / CI-03: Detect which paths changed ──────────────────────────────
  # Runs fast (<30 s). Outputs drive api/console job skip conditions.

  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      console: ${{ steps.filter.outputs.console }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: dorny/paths-filter@v3  # pin SHA via Dependabot once OSS-01 is merged
        id: filter
        with:
          filters: |
            api:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'
              - 'tsconfig*.json'
              - 'vitest*.config.ts'
            console:
              - 'console/**'

  # ── API: type-check, unit tests, security audit ────────────────────────────

  api:
    name: API — type-check, test, audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Unit tests
        run: npm test
        # Integration tests (npm run test:integration) require a Docker daemon with
        # Testcontainers support and are not run in CI. Run them locally before merging.

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  # ── Console: type-check, security audit ────────────────────────────────────

  console:
    name: Console — type-check, audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.console == 'true'
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Security audit
        run: npm audit --audit-level=high

  # ── Secrets scan ────────────────────────────────────────────────────────────
  # CI-07: Full history scan on push to main; PR-diff-only scan on pull_request
  # (scanning --all on every PR is slow and redundant — the full scan on merge
  # is the authoritative gate).

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks

      - name: Scan for secrets — full history (push to main)
        if: github.event_name == 'push'
        run: gitleaks detect --source . --config .gitleaks.toml --redact --log-opts="--all"

      - name: Scan for secrets — PR commits only (pull_request)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect --source . --config .gitleaks.toml --redact \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  # ── DCO sign-off check (CI-04) ─────────────────────────────────────────────
  # Rejects PRs where any commit is missing a Signed-off-by line.
  # Only runs on pull_request — push to main is gated by branch protection.

  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: github/dco@v1  # pin SHA via Dependabot once OSS-01 is merged

  # ── Publish images to GHCR ─────────────────────────────────────────────────
  # Runs only on push to main in the canonical repo.
  # Skips when no code changed (doc-only push): both api and console skipped
  # → neither succeeded → publish condition evaluates to false.
  # Handles path-filter skips via always() + explicit result checks.
  # CI-05: github.repository guard prevents accidental runs in forks.

  publish:
    name: Publish — push images to GHCR
    runs-on: ubuntu-latest
    needs: [api, console, secrets]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.repository == 'nestfleet/nestfleet' &&
      needs.secrets.result == 'success' &&
      (needs.api.result == 'success' || needs.api.result == 'skipped') &&
      (needs.console.result == 'success' || needs.console.result == 'skipped') &&
      (needs.api.result == 'success' || needs.console.result == 'success')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nestfleet-api:latest

      - name: Build and push Console image
        # NEXT_PUBLIC_PRODUCT_ID is baked at build time. Set the secret to the
        # main-VPS product ID so nestfleet.dev gets the right value. Customer VPS
        # consoles are built locally during provisioning with their own product ID.
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # docker/build-push-action@v6
        with:
          context: console
          file: console/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nestfleet-console:latest
          build-args: |
            NEXT_PUBLIC_PRODUCT_ID=${{ secrets.NEXT_PUBLIC_PRODUCT_ID }}
            NEXT_PUBLIC_API_URL=

  # ── Deploy to main VPS ─────────────────────────────────────────────────────
  # CI-05: github.repository guard prevents accidental deploys from forks.

  deploy:
    name: Deploy — main VPS
    runs-on: ubuntu-latest
    needs: [publish]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.repository == 'nestfleet/nestfleet'
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_HOST }} '
            set -e
            cd /opt/nestfleet
            git fetch origin main
            git reset --hard origin/main
            docker image prune -a --force
            docker compose -f docker-compose.prod.yml pull api console
            docker compose -f docker-compose.prod.yml up -d --no-deps api console
          '

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Smoke test
        run: |
          sleep 30

          # 1. Health — DB + queue both must report ok
          HEALTH=$(curl --fail --silent https://nestfleet.dev/health)
          echo "$HEALTH" | grep -q '"status":"ok"'    || (echo "Health status not ok: $HEALTH"  && exit 1)
          echo "$HEALTH" | grep -q '"queue":"started"' || (echo "pg-boss not started: $HEALTH"  && exit 1)
          echo "$HEALTH" | grep -q '"db":"ok"'         || (echo "DB not ok: $HEALTH"            && exit 1)
          echo "Health check passed: $HEALTH"

          # 2. Auth flow — real login, JWT returned (proves DB read works)
          if [ -n "${{ secrets.CANARY_EMAIL }}" ] && [ -n "${{ secrets.CANARY_PASSWORD }}" ]; then
            LOGIN=$(curl --fail --silent -X POST https://nestfleet.dev/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"${{ secrets.CANARY_EMAIL }}","password":"${{ secrets.CANARY_PASSWORD }}"}')
            echo "$LOGIN" | grep -q '"token"' || (echo "Login did not return a token: $LOGIN" && exit 1)
            echo "Auth smoke passed"

            # 3. Authenticated /auth/me — proves full DB CRUD round-trip
            TOKEN=$(echo "$LOGIN" | jq -r '.token')
            ME=$(curl --fail --silent https://nestfleet.dev/api/v1/auth/me \
              -H "Authorization: Bearer $TOKEN")
            echo "$ME" | grep -q '"email"' || (echo "/auth/me failed: $ME" && exit 1)
            echo "CRUD smoke passed"
          else
            echo "Canary creds not set — skipping auth/CRUD smoke"
          fi

  # ── Pipeline smoke test ────────────────────────────────────────────────────
  # CI-05: github.repository guard prevents accidental runs in forks.

  smoke-pipeline:
    name: Smoke — pipeline end-to-end
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.repository == 'nestfleet/nestfleet'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tsx
        run: npm install -g tsx

      - name: Run pipeline smoke test
        env:
          SMOKE_BASE_URL: https://nestfleet.dev
          SMOKE_PRODUCT_ID: ${{ secrets.SMOKE_PRODUCT_ID }}
          SMOKE_WEBHOOK_SECRET: ${{ secrets.SMOKE_WEBHOOK_SECRET }}
          SMOKE_API_TOKEN: ${{ secrets.SMOKE_API_TOKEN }}
        run: tsx scripts/smoke-pipeline.ts

  # ── E2E browser tests ──────────────────────────────────────────────────────
  # CI-05: github.repository guard prevents accidental runs in forks.

  e2e:
    name: E2E — post-deploy browser tests
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.repository == 'nestfleet/nestfleet'
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('console/package-lock.json') }}

      - name: Install Playwright browser binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        run: sudo npx playwright install-deps chromium

      - name: Run post-deploy E2E tests
        env:
          BASE_URL: https://nestfleet.dev
          CANARY_EMAIL: ${{ secrets.CANARY_EMAIL }}
          CANARY_PASSWORD: ${{ secrets.CANARY_PASSWORD }}
        run: npx playwright test e2e/post-deploy.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: console/playwright-report/
          retention-days: 7
